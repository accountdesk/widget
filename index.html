<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccountDesk Widget - Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 40px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .config-panel {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      max-width: 700px;
      margin-bottom: 32px;
    }
    .config-panel h2 {
      font-size: 18px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .config-field { display: flex; flex-direction: column; gap: 4px; }
    .config-field.full { grid-column: 1 / -1; }
    .config-field label { font-size: 13px; font-weight: 500; color: #555; }
    .config-field input, .config-field select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .config-field input:focus, .config-field select:focus {
      outline: none;
      border-color: #1976D2;
    }
    .code-panel {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      max-width: 700px;
    }
    .code-panel h2 { font-size: 18px; margin-bottom: 16px; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
    }
    .copy-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: #1976D2;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .copy-btn:hover { background: #1565C0; }
    @media (max-width: 600px) {
      .config-grid { grid-template-columns: 1fr; }
      body { padding: 16px; }
    }
  </style>
</head>
<body>
  <h1>AccountDesk Widget Demo</h1>
  <p class="subtitle">Konfiguriere das Widget und sieh die Live-Vorschau unten rechts.</p>

  <div class="config-panel">
    <h2>Konfiguration</h2>
    <div class="config-grid">
      <div class="config-field full">
        <label for="cfg-token">Token (JWT)</label>
        <input id="cfg-token" type="text" placeholder="eyJhbGciOi..." value="">
      </div>
      <div class="config-field full">
        <label for="cfg-api-url">API URL</label>
        <input id="cfg-api-url" type="text" value="http://localhost:8080/api">
      </div>
      <div class="config-field">
        <label for="cfg-language">Sprache</label>
        <select id="cfg-language">
          <option value="" selected>Automatisch (Browser)</option>
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-color">Farbe</label>
        <input id="cfg-color" type="color" value="#1976D2">
      </div>
      <div class="config-field">
        <label for="cfg-position">Position</label>
        <select id="cfg-position">
          <option value="bottom-right" selected>Unten rechts</option>
          <option value="bottom-left">Unten links</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-subject">Betreff anzeigen</label>
        <select id="cfg-subject">
          <option value="true" selected>Ja</option>
          <option value="false">Nein</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-attachments">Dateianhang erlauben</label>
        <select id="cfg-attachments">
          <option value="true" selected>Ja</option>
          <option value="false">Nein</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-suggest">Artikel-Vorschläge (Live)</label>
        <select id="cfg-suggest">
          <option value="true" selected>An</option>
          <option value="false">Aus</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-screenshot">Bildschirmfoto-Knopf</label>
        <select id="cfg-screenshot">
          <option value="false" selected>Aus</option>
          <option value="true">An</option>
        </select>
      </div>
      <div class="config-field">
        <label for="cfg-mode">Modus</label>
        <select id="cfg-mode">
          <option value="floating" selected>Floating (Bubble)</option>
          <option value="inline">Inline</option>
        </select>
      </div>
      <div class="config-field full">
        <label for="cfg-button-text">Button-Text (leer = Standard)</label>
        <input id="cfg-button-text" type="text" placeholder="">
      </div>
    </div>
  </div>

  <div class="code-panel">
    <h2>Integrations-Code</h2>
    <pre id="code-output"></pre>
    <button class="copy-btn" id="copy-btn">Code kopieren</button>
  </div>

  <!-- Widget wird hier live geladen -->
  <script type="module" src="/src/index.ts"></script>

  <script>
    // Widget-Element erstellen
    const widget = document.createElement('accountdesk-widget')
    document.body.appendChild(widget)

    // Config-Felder
    const fields = {
      token: document.getElementById('cfg-token'),
      apiUrl: document.getElementById('cfg-api-url'),
      language: document.getElementById('cfg-language'),
      color: document.getElementById('cfg-color'),
      position: document.getElementById('cfg-position'),
      subject: document.getElementById('cfg-subject'),
      attachments: document.getElementById('cfg-attachments'),
      suggest: document.getElementById('cfg-suggest'),
      screenshot: document.getElementById('cfg-screenshot'),
      mode: document.getElementById('cfg-mode'),
      buttonText: document.getElementById('cfg-button-text'),
    }

    // Default-Token aus URL-Hash (?token=…) oder localStorage
    const urlToken = new URLSearchParams(location.search).get('token')
    if (urlToken) { fields.token.value = urlToken; localStorage.setItem('demo_token', urlToken) }
    else if (localStorage.getItem('demo_token')) { fields.token.value = localStorage.getItem('demo_token') }

    function updateWidget() {
      widget.setAttribute('token', fields.token.value)
      widget.setAttribute('api-url', fields.apiUrl.value)
      if (fields.language.value) {
        widget.setAttribute('language', fields.language.value)
      } else {
        widget.removeAttribute('language')
      }
      widget.setAttribute('primary-color', fields.color.value)
      widget.setAttribute('position', fields.position.value)
      widget.setAttribute('show-subject', fields.subject.value)
      widget.setAttribute('show-attachments', fields.attachments.value)
      widget.setAttribute('suggest-articles', fields.suggest.value)
      widget.setAttribute('screenshot', fields.screenshot.value)
      widget.setAttribute('mode', fields.mode.value)
      if (fields.buttonText.value) {
        widget.setAttribute('button-text', fields.buttonText.value)
      } else {
        widget.removeAttribute('button-text')
      }
      if (fields.token.value) localStorage.setItem('demo_token', fields.token.value)
      updateCode()
    }

    function updateCode() {
      const token = fields.token.value || 'DEIN_TOKEN_HIER'
      const attrs = []
      attrs.push(`  token="${token}"`)
      if (fields.apiUrl.value && fields.apiUrl.value !== 'https://api.accountdesk.de') {
        attrs.push(`  api-url="${fields.apiUrl.value}"`)
      }
      if (fields.language.value) attrs.push(`  language="${fields.language.value}"`)
      if (fields.color.value !== '#1976D2') attrs.push(`  primary-color="${fields.color.value}"`)
      if (fields.position.value !== 'bottom-right') attrs.push(`  position="${fields.position.value}"`)
      if (fields.subject.value === 'false') attrs.push(`  show-subject="false"`)
      if (fields.attachments.value === 'false') attrs.push(`  show-attachments="false"`)
      if (fields.suggest.value === 'true') attrs.push(`  suggest-articles="true"`)
      if (fields.screenshot.value === 'true') attrs.push(`  screenshot="true"`)
      if (fields.mode.value === 'inline') attrs.push(`  mode="inline"`)
      if (fields.buttonText.value) attrs.push(`  button-text="${fields.buttonText.value}"`)

      const code = `<script src="https://my.accountdesk.de/widget/accountdesk-widget.js"><\/script>\n<accountdesk-widget\n${attrs.join('\n')}\n></accountdesk-widget>`
      document.getElementById('code-output').textContent = code
    }

    // Events binden
    Object.values(fields).forEach(el => {
      el.addEventListener('input', updateWidget)
      el.addEventListener('change', updateWidget)
    })

    // Kopier-Button
    document.getElementById('copy-btn').addEventListener('click', () => {
      const code = document.getElementById('code-output').textContent
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn')
        btn.textContent = 'Kopiert!'
        setTimeout(() => btn.textContent = 'Code kopieren', 2000)
      })
    })

    // Initial
    updateWidget()
  </script>
</body>
</html>
